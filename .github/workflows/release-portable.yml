name: Release Portable

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows-portable:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[build]"

      - name: Build Portable Package
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          .\scripts\build_portable.ps1 -PythonExe "python" -Version $version -Platform "win64"

      - name: Create Or Update Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ github.ref_name }}"
          $archive = "dist\RailCurveExtractor-win64-portable-$version.zip"
          gh release view $version *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $version $archive --generate-notes --title $version
          }
          else {
            gh release upload $version $archive --clobber
          }
