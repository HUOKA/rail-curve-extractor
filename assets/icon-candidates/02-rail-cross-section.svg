<?xml version="1.0" encoding="UTF-8"?>
<!--
  Candidate 02 — Cross section of an I-beam rail with a centerline running through it.
  More engineer-flavored: shows the actual "工" shape of a rail profile (head, web, foot),
  and the green axis line that the algorithm extracts.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg02" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f1729"/>
      <stop offset="1" stop-color="#0a0f1d"/>
    </linearGradient>
  </defs>

  <rect x="8" y="8" width="240" height="240" rx="48" fill="url(#bg02)"/>
  <rect x="8" y="8" width="240" height="240" rx="48" fill="none" stroke="#34d399" stroke-opacity="0.25" stroke-width="2"/>

  <!-- I-beam rail cross section, vertical orientation, slate metal color -->
  <g fill="#94a3b8">
    <!-- head -->
    <rect x="76" y="48" width="104" height="22" rx="5"/>
    <!-- web -->
    <rect x="114" y="68" width="28" height="120"/>
    <!-- foot -->
    <rect x="60" y="186" width="136" height="22" rx="5"/>
    <!-- foot wedges (slight angle to read as foot taper) -->
    <polygon points="60,186 76,186 76,196"/>
    <polygon points="196,186 180,186 180,196"/>
  </g>

  <!-- subtle hairline shading suggesting depth -->
  <line x1="76" y1="56" x2="180" y2="56" stroke="#cbd5e1" stroke-width="1" opacity="0.35"/>
  <line x1="60" y1="194" x2="196" y2="194" stroke="#cbd5e1" stroke-width="1" opacity="0.35"/>

  <!-- vertical centerline running through the web -->
  <line x1="128" y1="32" x2="128" y2="224"
        stroke="#6ee7b7" stroke-width="3" stroke-linecap="round"
        stroke-dasharray="6 6"/>

  <!-- extraction markers: brackets above and below to imply "this axis" -->
  <g stroke="#34d399" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M 116 32 L 128 24 L 140 32"/>
    <path d="M 116 224 L 128 232 L 140 224"/>
  </g>

  <!-- accent dot at the rail center -->
  <circle cx="128" cy="128" r="6" fill="#34d399"/>
  <circle cx="128" cy="128" r="11" fill="none" stroke="#6ee7b7" stroke-opacity="0.5" stroke-width="2"/>
</svg>
